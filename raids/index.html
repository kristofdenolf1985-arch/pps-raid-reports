<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raid Nights — Index</title>
<link rel="icon" href="data:,">
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
  --text: #e2e8f0; --muted: #8892a4;
  --green: #22c55e; --yellow: #eab308; --orange: #f97316; --red: #ef4444;
  --gold: #fbbf24; --accent: #6366f1;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--text);
  font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.45;
}
.wrap { max-width: 1200px; margin: 0 auto; padding: 20px 16px 48px; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
h1 { font-size: 24px; margin: 0 0 4px; }
h2 { font-size: 18px; margin: 0 0 12px; }
.card, section.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; margin-bottom: 20px;
}
.subline { color: var(--muted); font-size: 13px; }
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--bg);
  font-size: 12px; margin-right: 6px;
}
.topnav { margin-bottom: 16px; font-size: 13px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.stat .value { font-size: 26px; font-weight: 700; }
.stat .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.stat .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.stat.accent { border-color: var(--orange); }
.stat.accent .value { color: var(--orange); }
.tablewrap { overflow-x: auto; position: relative; }
.tablewrap::after {
  content: ""; position: absolute; top: 0; right: 0; bottom: 0; width: 20px;
  background: linear-gradient(to right, transparent, var(--surface));
  pointer-events: none;
}
table { border-collapse: collapse; width: 100%; font-size: 13px; }
th, td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
th:first-child, td:first-child { position: sticky; left: 0; background: var(--surface); }
td.num, th.num { text-align: right; }
.sort-arrow { margin-left: 4px; opacity: 0.6; }
.dim { color: var(--muted); opacity: 0.55; }
.good { color: var(--green); }
.warn { color: var(--yellow); }
.caution { color: var(--orange); }
.bad { color: var(--red); }
.gold { color: var(--gold); }
.pill {
  display: inline-block; min-width: 44px; text-align: center;
  padding: 1px 8px; border-radius: 6px; font-weight: 600; font-size: 12px;
}
.pill.good { background: rgba(34,197,94,.15); }
.pill.warn { background: rgba(234,179,8,.15); }
.pill.caution { background: rgba(249,115,22,.15); }
.pill.bad { background: rgba(239,68,68,.15); }
.pill.na { background: transparent; color: var(--muted); opacity: .55; }
.role {
  display: inline-block; padding: 1px 8px; border-radius: 999px;
  font-size: 11px; border: 1px solid var(--border); color: var(--muted);
}
.callout {
  border-left: 3px solid var(--orange); background: rgba(249,115,22,.08);
  padding: 6px 12px; border-radius: 0 6px 6px 0; margin-top: 8px; font-size: 13px;
}
.flag {
  border-left: 3px solid var(--yellow); background: rgba(234,179,8,.07);
  padding: 6px 12px; border-radius: 0 6px 6px 0; margin-top: 8px; font-size: 13px;
}
.cards2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.cards2 .card { margin-bottom: 0; }
.wraptext { white-space: normal; min-width: 180px; }
.sortable th { cursor: pointer; user-select: none; }
.sortable th:hover { color: var(--text); }
details.bench { margin-top: 12px; }
details.bench summary { cursor: pointer; color: var(--muted); font-size: 13px; }
details.bench ul { margin: 8px 0 0; }
details.legend {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
}
details.legend summary { cursor: pointer; color: var(--muted); font-size: 13px; }
details.legend .legend-body { margin-top: 10px; font-size: 13px; color: var(--muted); }
details.legend .legend-body p { margin: 6px 0; }
details.legend .legend-body strong { color: var(--text); }
footer { color: var(--muted); font-size: 12px; margin-top: 24px; }
@media (max-width: 1000px) {
  .cards2 { grid-template-columns: 1fr; }
}
@media (max-width: 700px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  h1 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="wrap">

<div class="topnav"><a href="../index.html">Latest night</a></div>
<section class="panel">
  <h1>Raid Nights</h1>
  <div class="tablewrap"><table>
    <thead><tr><th>Date</th><th>Content</th><th class="num">Kills</th><th class="num">Wipes</th><th class="num">Night Total</th></tr></thead>
    <tbody><tr><td><a href="2026-07-01.html">2026-07-01</a></td><td class="wraptext">SSC 6/6 · TK 4/4 · Gruul 2/2</td><td class="num">12</td><td class="num">5</td><td class="num">2h 45m</td></tr><tr><td>2026-06-24</td><td class="wraptext">Serpentshrine Cavern, Tempest Keep: The Eye</td><td class="num">10</td><td class="num">6</td><td class="num">3h 0m</td></tr><tr><td>2026-06-17</td><td class="wraptext">Serpentshrine Cavern, Tempest Keep: The Eye</td><td class="num">12</td><td class="num">2</td><td class="num">3h 2m</td></tr></tbody>
  </table></div>
</section>
<footer>Generated by tools/raid-html.</footer>
</div>
<script>
document.querySelectorAll('table.sortable').forEach(function (table) {
  var dir = {};
  var heads = table.querySelectorAll('th');
  heads.forEach(function (th, col) {
    th.addEventListener('click', function () {
      var rows = Array.from(table.tBodies[0].rows);
      dir[col] = -(dir[col] || -1);
      rows.sort(function (a, b) {
        var av = a.cells[col].getAttribute('data-sort');
        var bv = b.cells[col].getAttribute('data-sort');
        var an = parseFloat(av), bn = parseFloat(bv);
        if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir[col];
        return String(av).localeCompare(String(bv)) * dir[col];
      });
      rows.forEach(function (r) { table.tBodies[0].appendChild(r); });
      heads.forEach(function (h) {
        var arrow = h.querySelector('.sort-arrow');
        if (arrow) arrow.textContent = '';
      });
      var activeArrow = th.querySelector('.sort-arrow');
      if (activeArrow) activeArrow.textContent = dir[col] > 0 ? ' ▲' : ' ▼';
    });
  });
});
</script>
</body>
</html>
